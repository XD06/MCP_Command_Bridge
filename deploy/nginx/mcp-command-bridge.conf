# ==========================================================================
#  Nginx reverse proxy for MCP Command Bridge — Reference Config
#
#  How to use:
#    1. Replace YOUR_DOMAIN with your actual domain
#    2. Replace YOUR_VPS_IP with your VPS IP (or keep 127.0.0.1 if Nginx runs on the same host)
#    3. Copy to /etc/nginx/sites-available/ and symlink to sites-enabled/
#    4. Obtain SSL cert: certbot --nginx -d YOUR_DOMAIN
#       or use your own TLS certificates
#
#  This config provides:
#    - TLS termination (HTTPS)
#    - Rate limiting (10 req/s per IP, burst 20)
#    - Connection limiting (max 10 concurrent per IP)
#    - Security headers
#    - Reverse proxy to the Docker container on port 8765
# ==========================================================================

# Rate limiting: 10 requests/second per IP (burst allowed)
limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;

# Connection limiting: max 10 concurrent per IP
limit_conn_zone $binary_remote_addr zone=mcp_conn:10m;

upstream mcp_bridge {
    # If Nginx runs on the same host as Docker:
    server 127.0.0.1:8765;
    # If Nginx runs on a different host, use the VPS IP:
    # server YOUR_VPS_IP:8765;
    keepalive 16;
}

# ==========================================================================
#  HTTP — redirect to HTTPS (certbot will modify this block)
# ==========================================================================
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # ACME challenge (Let's Encrypt)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================================================
#  HTTPS — main server block
#  If using certbot, it will add the SSL directives below automatically.
#  If using your own certs, uncomment and set the paths.
# ==========================================================================
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # --- TLS certificates ---
    # Option A: Let certbot manage these (it will fill them in automatically)
    # Option B: Use your own certificates:
    # ssl_certificate     /etc/ssl/certs/YOUR_DOMAIN.crt;
    # ssl_certificate_key /etc/ssl/private/YOUR_DOMAIN.key;

    # --- TLS settings ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Rate limiting ---
    limit_req zone=mcp_limit burst=20 nodelay;
    limit_conn mcp_conn 10;
    limit_req_status 429;
    limit_conn_status 429;

    # --- MCP Streamable HTTP endpoint ---
    location /mcp {
        proxy_pass http://mcp_bridge;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP may use SSE-style streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 10m;
    }

    # --- SSE transport endpoint (legacy / fallback) ---
    location /sse {
        proxy_pass http://mcp_bridge;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # --- Block everything else ---
    location / {
        return 404;
    }
}
