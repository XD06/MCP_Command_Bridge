# ==========================================================================
#  Nginx reverse proxy for MCP Command Bridge
#  TLS termination + rate limiting + security headers
#
#  The deploy script replaces __DOMAIN__ with your real domain.
#  Certbot (--nginx) adds the HTTPS server block automatically.
# ==========================================================================

# Rate limiting: 10 requests/second per IP (burst allowed)
limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;

# Connection limiting: max 10 concurrent per IP
limit_conn_zone $binary_remote_addr zone=mcp_conn:10m;

upstream mcp_bridge {
    server 127.0.0.1:8765;
    keepalive 16;
}

server {
    listen 80;
    server_name __DOMAIN__;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Referrer-Policy "no-referrer" always;

    # Rate limiting
    limit_req zone=mcp_limit burst=20 nodelay;
    limit_conn mcp_conn 10;
    limit_req_status 429;
    limit_conn_status 429;

    # ACME challenge (Let's Encrypt)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # MCP Streamable HTTP endpoint
    location /mcp {
        proxy_pass http://mcp_bridge;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP may use SSE-style streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 10m;
    }

    # SSE transport endpoint (legacy / fallback)
    location /sse {
        proxy_pass http://mcp_bridge;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Block everything else
    location / {
        return 404;
    }
}
