# ==========================================================================
#  MCP Command Bridge — docker-compose.yml
#  Data mapped to host for easy access. Resource limits enforced.
#  Port 8765 exposed — set up your own reverse proxy (Nginx/Caddy) for TLS.
#  Reference Nginx config: deploy/nginx/mcp-command-bridge.conf
# ==========================================================================
services:
  mcp-bridge:
    build: .
    container_name: mcp-bridge
    restart: unless-stopped

    # Expose port 8765 — set up your own reverse proxy (Nginx/Caddy/etc.)
    ports:
      - "8765:8765"

    environment:
      # REQUIRED: strong token (set in .env, generated by deploy script)
      - MCB_TOKEN=${MCB_TOKEN:?MCB_TOKEN must be set in .env}
      # Optional: secrets as env vars (MCB_SECRET_<NAME>)
      # - MCB_SECRET_SIYUAN_TOKEN=${SIYUAN_TOKEN:-}

    volumes:
      # Runtime config (generated by deploy script from config.vps.yaml)
      - ./config.yaml:/app/config.vps.yaml:ro
      # Workspace files — visible on host at ./data/workspace/
      - ./data/workspace:/app/agent_workspace
      # Audit logs — visible on host at ./data/logs/
      - ./data/logs:/app/logs

    # Allow container to access services on the host (e.g. SiYuan at
    # host.docker.internal:6806 instead of 127.0.0.1:6806)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 64M

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8765/mcp/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    # Log driver with rotation
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
