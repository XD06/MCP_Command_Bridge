# ==========================================================================
#  MCP Command Bridge — VPS / Docker Config (Container Full-Control Mode)
#
#  Since the bridge runs inside a Docker container, the container IS the
#  sandbox. This config gives the agent full control of the container:
#    - All programs exposed (run_program enabled)
#    - No URL/method/script-path restrictions
#    - Full filesystem access inside the container
#    - Longer timeouts and larger output limits
#
#  Host is still protected by Docker isolation + volume mount boundaries.
#  The deploy script copies this to config.yaml and replaces __DOMAIN__.
# ==========================================================================

server:
  host: "0.0.0.0"
  port: 8765

  # Token is read from MCB_TOKEN env var at runtime (always overrides this).
  token: "set-via-MCB_TOKEN-env-var"

  # Expose run_program — agent can execute any configured program
  expose_advanced_tools: true

  # No preflight required — less friction for the agent
  require_capability_preflight: false

  # Use individual tools for clarity
  compact_toolset: false

  # App-level rate limit (requests per minute per client IP).
  rate_limit_per_minute: 120

  # Origins: the deploy script replaces __DOMAIN__ with your real domain
  allowed_origins:
    - "https://__DOMAIN__"

  allowed_hosts:
    - "127.0.0.1:8765"
    - "localhost:8765"
    - "__DOMAIN__"

execution:
  default_cwd: "/app"
  # Empty allowed_roots = allow any directory inside the container
  allowed_roots: []
  # Writable roots for file tools — workspace + app dir
  writable_roots:
    - "/app/agent_workspace"
    - "/app"
  timeout_seconds: 300
  max_output_bytes: 500000
  audit_log: "logs/audit.jsonl"

# Secrets are read from MCB_SECRET_* env vars at runtime.
# secrets:
#   SIYUAN_TOKEN: "replace-me"

programs:
  curl:
    enabled: true
    executable: "curl"
    # Empty allowed_methods = allow all methods
    allowed_methods: []
    denied_methods: []
    # Empty allowed_url_prefixes = allow all URLs
    allowed_url_prefixes: []
    denied_schemes: ["file"]
    denied_args: []
    timeout_seconds: 60

  npm:
    enabled: true
    executable: "npm"
    # Empty allowed_subcommands = allow all
    allowed_subcommands: []
    denied_args: []
    timeout_seconds: 300

  node:
    enabled: true
    executable: "node"
    denied_args: []
    # Empty allowed_script_roots = allow any path
    allowed_script_roots: []
    timeout_seconds: 300

  python3:
    enabled: true
    executable: "python3"
    denied_args: []
    allowed_script_roots: []
    timeout_seconds: 300

  bash:
    enabled: true
    executable: "bash"
    denied_args: []
    timeout_seconds: 300

  git:
    enabled: true
    executable: "git"
    denied_args: []
    timeout_seconds: 300

  apt-get:
    enabled: true
    executable: "apt-get"
    denied_args: []
    timeout_seconds: 600

  pip:
    enabled: true
    executable: "pip"
    denied_args: []
    timeout_seconds: 300

  wget:
    enabled: true
    executable: "wget"
    denied_args: []
    timeout_seconds: 120
