# ==========================================================================
#  MCP Command Bridge — VPS / Docker Config Template
#  The deploy script copies this to config.yaml and replaces __DOMAIN__.
#  Bind to 127.0.0.1 behind Nginx reverse proxy (HTTPS termination).
#  Secrets via env vars: MCB_TOKEN, MCB_SECRET_*
# ==========================================================================

server:
  # Bind to loopback — Nginx handles public-facing TLS
  host: "127.0.0.1"
  port: 8765

  # Token is read from MCB_TOKEN env var at runtime (always overrides this).
  token: "set-via-MCB_TOKEN-env-var"

  expose_advanced_tools: false
  require_capability_preflight: true
  compact_toolset: true

  # IP allowlist (optional). Leave empty to allow any IP.
  # Nginx + token + rate limiting already protect you.
  # Uncomment and set your phone IP for an extra layer:
  # ip_allowlist:
  #   - "203.0.113.50"

  # App-level rate limit (requests per minute per client IP).
  # Nginx also has its own rate limit — this is a second line of defense.
  rate_limit_per_minute: 60

  # Origins: the deploy script replaces __DOMAIN__ with your real domain
  allowed_origins:
    - "https://__DOMAIN__"

  allowed_hosts:
    - "127.0.0.1:8765"
    - "localhost:8765"
    - "__DOMAIN__"

execution:
  default_cwd: "."
  allowed_roots:
    - "."
    - "agent_workspace"
  writable_roots:
    - "agent_workspace"
  timeout_seconds: 30
  max_output_bytes: 200000
  audit_log: "logs/audit.jsonl"

# Secrets are read from MCB_SECRET_* env vars at runtime.
# Example: MCB_SECRET_SIYUAN_TOKEN=actual-token-here
# Uncomment below only as a fallback; env vars always override.
# secrets:
#   SIYUAN_TOKEN: "replace-me"

programs:
  curl:
    enabled: true
    executable: "curl"
    allowed_methods: ["GET", "POST", "PUT", "PATCH", "HEAD"]
    denied_methods: ["DELETE"]
    # In Docker, use host.docker.internal to reach host services (e.g. SiYuan)
    allowed_url_prefixes:
      - "http://host.docker.internal:6806/"
      - "https://www.baidu.com/"
      - "https://www.bing.com/"
      - "https://example.com/"
      - "https://www.google.com/"
      - "https://github.com/"
      - "https://api.github.com/"
      - "https://api.ollama.com/"
      - "https://raw.githubusercontent.com/"
      - "https://httpbin.org/"
    denied_schemes: ["file", "ftp"]
    denied_args: ["-o", "--output", "-O", "--remote-name", "-T", "--upload-file", "--config", "-K"]
    timeout_seconds: 30

  npm:
    enabled: true
    executable: "npm"
    allowed_subcommands: ["test", "run"]
    denied_args: ["exec", "x", "install", "ci"]
    timeout_seconds: 120

  node:
    enabled: true
    executable: "node"
    denied_args: ["-e", "--eval"]
    allowed_script_roots: [".", "agent_workspace"]
    timeout_seconds: 60

  python3:
    enabled: true
    executable: "python3"
    denied_args: ["-c", "-m"]
    allowed_script_roots: [".", "agent_workspace"]
    timeout_seconds: 60
